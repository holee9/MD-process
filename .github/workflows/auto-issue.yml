name: Auto Issue from Drafts

on:
  push:
    branches: [main]
    paths:
      - 'issue-drafts/**.md'
      - '.github/workflows/auto-issue.yml'
  workflow_dispatch: {}

permissions:
  issues: write
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show workspace
        run: |
          echo "=== ls -la ==="
          ls -la
          echo "=== issue-drafts/ ==="
          ls -la issue-drafts/ 2>&1 || true
          echo "=== gh version ==="
          gh --version || true
          echo "=== jq version ==="
          jq --version || true

      - name: Sync drafts to issues
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          set -x

          LOG="issue-drafts/_log.json"
          [ -f "$LOG" ] || echo '{}' > "$LOG"
          echo "initial log: $(cat "$LOG")"

          changed=0
          shopt -s nullglob
          files=(issue-drafts/*.md)
          echo "found ${#files[@]} files"

          for f in "${files[@]}"; do
            name="$(basename "$f")"
            case "$name" in _*|README.md) echo "skip $name"; continue ;; esac
            echo "=== processing $name ==="

            # Extract frontmatter
            title=""; body_start=1
            if [ "$(head -n 1 "$f" | tr -d '[:space:]')" = "---" ]; then
              end_line=$(awk 'NR>1 && /^---[[:space:]]*$/ {print NR; exit}' "$f")
              if [ -n "$end_line" ]; then
                title=$(sed -n "2,$((end_line-1))p" "$f" | grep -E '^title:' | head -n1 | sed -E 's/^title:[[:space:]]*//; s/^"(.*)"$/\1/; s/^'"'"'(.*)'"'"'$/\1/')
                body_start=$((end_line+1))
              fi
            fi
            [ -z "$title" ] && title="$name"
            echo "title: [$title]"

            bodyfile=$(mktemp)
            tail -n +$body_start "$f" > "$bodyfile"

            issue_num=$(jq -r --arg k "$name" '.[$k] // empty' "$LOG")
            echo "existing issue: [$issue_num]"

            if [ -z "$issue_num" ]; then
              echo "creating new issue..."
              out=$(gh issue create --title "$title" --body-file "$bodyfile" 2>&1)
              echo "gh output: $out"
              num=$(echo "$out" | grep -oE 'https://github\.com/[^/]+/[^/]+/issues/[0-9]+' | grep -oE '[0-9]+$' | tail -n1)
              if [ -n "$num" ]; then
                jq --arg k "$name" --arg v "$num" '.[$k]=$v' "$LOG" > "$LOG.tmp" && mv "$LOG.tmp" "$LOG"
                changed=1
                echo "SUCCESS: created #$num"
              else
                echo "FAILED to parse issue number"
              fi
            else
              echo "updating #$issue_num"
              gh issue edit "$issue_num" --title "$title" --body-file "$bodyfile"
            fi
          done

          echo "final log: $(cat "$LOG")"
          echo "changed=$changed"

          if [ "$changed" -eq 1 ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "$LOG"
            git commit -m "chore(issues): update _log.json [skip ci]"
            git push
          fi
          exit 0
